spring:

  autoconfigure:
    exclude:
      # Exclude mail auto-config (remove these lines once real SMTP credentials are set)
      - org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
      - org.springframework.boot.autoconfigure.mail.MailSenderValidatorAutoConfiguration

  datasource:
    # Usamos variables de entorno para no subir secretos a GitHub
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}?sslmode=require&prepareThreshold=0
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    
    # Configuración de Hikari (el pool de conexiones)
    hikari:
      maximum-pool-size: 5  # El plan gratis de Supabase tiene límites, 5 está bien
      minimum-idle: 1
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      pool-name: HikariPool-Supabase

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # 'update' crea las tablas si no existen. 
      # En producción avanzada se usa 'validate'.
      ddl-auto: update 
    show-sql: false # Cambia a true si quieres ver las consultas en la consola
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

  web:
    resources:
      static-locations: classpath:/static/, file:uploads/
      add-mappings: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

  # ── Email (JavaMailSender) ──────────────────────────────────────────────────
  # Replace the placeholder values with your real SMTP server credentials.
  # Then REMOVE the MailSender* entries from the autoconfigure.exclude list above.
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:YOUR_GMAIL_ADDRESS}
    password: ${MAIL_PASSWORD:YOUR_GMAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ── Cache (Caffeine) ─────────────────────────────────────────────────────────
  cache:
    type: caffeine
    cache-names: manuals, manualById, chapters, chaptersByManual, questionsByChapter
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10m

server:
  port: ${SERVER_PORT:8080}
  # ── Gzip Compression ────────────────────────────────────────────────────────
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain,text/css,application/javascript
    min-response-size: 1024

app:
  jwt:
    secret: ${JWT_SECRET:CHANGE_ME_IN_PRODUCTION}
    expiration-ms: ${JWT_EXPIRATION:10800000} # 3 hours
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  # reCAPTCHA v2
  recaptcha:
    secret-key: ${RECAPTCHA_SECRET:}
    site-key: ${RECAPTCHA_SITE_KEY:}
  # ── Resend (Transactional Email) ─────────────────────────────────────────────
  resend:
    api-key: ${RESEND_API_KEY:re_123456789}
    from-email: ${RESEND_FROM_EMAIL:Voy a Pasar <hola@tudominio.com>}
  # MercadoPago (scaffold — replace with real credentials)
  mercadopago:
    access-token: ${MP_ACCESS_TOKEN:TEST-ACCESS-TOKEN}

# Enable scheduling for subscription expiry job
scheduling:
  enabled: true

logging:
  level:
    com.manualjudicial: ${LOG_LEVEL:DEBUG}
    org.springframework.security: ${LOG_LEVEL_SECURITY:WARN}
