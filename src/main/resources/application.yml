spring:
  autoconfigure:
    exclude:
      # Exclude mail auto-config (remove these lines once real SMTP credentials are set)
      - org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
      - org.springframework.boot.autoconfigure.mail.MailSenderValidatorAutoConfiguration

  datasource:
    url: jdbc:postgresql://localhost:5432/manualJavaApp
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  web:
    resources:
      static-locations: classpath:/static/, file:uploads/
      add-mappings: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

  # ── Email (JavaMailSender) ──────────────────────────────────────────────────
  # Replace the placeholder values with your real SMTP server credentials.
  # Then REMOVE the MailSender* entries from the autoconfigure.exclude list above.
  mail:
    host: smtp.gmail.com
    port: 587
    username: YOUR_GMAIL_ADDRESS # <-- replace with your Gmail address
    password: YOUR_GMAIL_APP_PASSWORD # <-- replace with 16-char App Password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

app:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration-ms: 10800000 # 3 hours
  frontend-url: http://localhost:5173
  # MercadoPago (scaffold — replace with real credentials)
  mercadopago:
    access-token: TEST-ACCESS-TOKEN

# Enable scheduling for subscription expiry job
scheduling:
  enabled: true

logging:
  level:
    com.manualjudicial: DEBUG
    org.springframework.security: DEBUG
